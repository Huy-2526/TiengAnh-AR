<!DOCTYPE html>
<head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>LinguaLand - Học qua ảnh AR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/three.js/build/ar.js"></script>
</head>

<body style='margin : 0px; overflow: hidden;'>
<script>
    var scene, camera, renderer, clock;
    var arToolkitSource, arToolkitContext;
    var markerRoot1;

    initialize();
    animate();

    function initialize() {
        scene = new THREE.Scene();
        let ambientLight = new THREE.AmbientLight(0xcccccc, 1.0);
        scene.add(ambientLight);

        camera = new THREE.Camera();
        scene.add(camera);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setClearColor(new THREE.Color('lightgrey'), 0);
        renderer.setSize(640, 480);
        renderer.domElement.style.position = 'absolute';
        document.body.appendChild(renderer.domElement);

        clock = new THREE.Clock();

        arToolkitSource = new THREEx.ArToolkitSource({ sourceType: 'webcam' });
        arToolkitSource.init(function onReady() { onResize(); });
        window.addEventListener('resize', function () { onResize(); });

        function onResize() {
            arToolkitSource.onResize();
            arToolkitSource.copySizeTo(renderer.domElement);
            if (arToolkitContext.arController !== null) {
                arToolkitSource.copySizeTo(arToolkitContext.arController.canvas);
            }
        }

        arToolkitContext = new THREEx.ArToolkitContext({
            cameraParametersUrl: 'https://raw.githack.com/AR-js-org/AR.js/master/data/data/camera_para.dat',
            detectionMode: 'mono'
        });
        arToolkitContext.init(function onCompleted() {
            camera.projectionMatrix.copy(arToolkitContext.getProjectionMatrix());
        });

        // THIẾT LẬP MARKER
        markerRoot1 = new THREE.Group();
        scene.add(markerRoot1);
        let markerControls1 = new THREEx.ArMarkerControls(arToolkitContext, markerRoot1, {
            type: 'pattern', 
            patternUrl: "ar/so1.patt", // File .patt của Huy
        });

        // --- ĐOẠN LOAD ẢNH CỦA HUY Ở ĐÂY ---
        let loader = new THREE.TextureLoader();
        // Thay 'images/so1.png' bằng đường dẫn ảnh của Huy
        loader.load('ar/so1.jpg', function (texture) {
            let geometry = new THREE.PlaneGeometry(1.2, 1.2); // Kích thước ảnh
            let material = new THREE.MeshBasicMaterial({ 
                map: texture, 
                transparent: true, // Để hiện được ảnh tách nền PNG
                side: THREE.DoubleSide 
            });
            let mesh = new THREE.Mesh(geometry, material);
            
            mesh.rotation.x = -Math.PI/2; // Đặt ảnh nằm ngang trên marker
            // Nếu muốn ảnh đứng thẳng trước mặt bé, Huy xóa dòng rotation ở trên đi
            
            markerRoot1.add(mesh);
        });
    }

    function update() {
        if (arToolkitSource.ready !== false) arToolkitContext.update(arToolkitSource.domElement);
    }

    function render() { renderer.render(scene, camera); }
    function animate() { requestAnimationFrame(animate); update(); render(); }
</script>
</body>
</html>
