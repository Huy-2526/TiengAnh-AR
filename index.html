<!DOCTYPE html>
<html>
<head>
    <title>LinguaLand - Học Tiếng Anh AR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
        
        <a-marker type="pattern" url="ar/pattern-apple.patt">
            <a-image src="images/apple.png" rotation="-90 0 0" width="1.2" height="1.2"></a-image>
        </a-marker>

        <a-marker type="pattern" url="ar/pattern-banana.patt">
            <a-image src="images/banana.png" rotation="-90 0 0" width="1.2" height="1.2"></a-image>
        </a-marker>

        <a-marker type="pattern" url="ar/pattern-bird.patt">
            <a-image src="images/bird.png" rotation="-90 0 0" width="1.2" height="1.2"></a-image>
        </a-marker>

        <a-marker type="pattern" url="ar/pattern-blue.patt">
            <a-image src="images/blue.png" rotation="-90 0 0" width="1.2" height="1.2"></a-image>

        </a-marker>

        <a-marker type="pattern" url="ar/pattern-moon.patt">

        <a-marker type="pattern" url="ar/pattern-so3.patt">
            <a-image src="images/so3.png" rotation="-90 0 0" width="1.2" height="1.2"></a-image>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

</html>
