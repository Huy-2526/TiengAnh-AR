<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>LinguaLand - Học Tiếng Anh AR</title>
    <!-- Sử dụng các phiên bản ổn định -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        
        #snap-button-container {
            position: fixed;
            bottom: 30px;
            left: 0; right: 0;
            display: flex;
            justify-content: center;
            z-index: 999;
            pointer-events: none;
        }
        #snap {
            pointer-events: auto;
            width: 80px; height: 80px;
            border-radius: 50%;
            border: 5px solid white;
            background: linear-gradient(135deg, #ff4b2b, #ff416c);
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        #snap:active { transform: scale(0.9); }
    </style>
</head>

<body>
    <!-- SỬA LỖI 1: Khai báo renderer đúng cú pháp A-Frame -->
    <a-scene 
        embedded 
        arjs="trackingBackend: artoolkit; sourceType: webcam; debugUIEnabled: false;"
        renderer="preserveDrawingBuffer: true; logarithmicDepthBuffer: true; antialias: true; alpha: true;">

        <!-- Các Marker -->
        <a-marker type="pattern" url="ar/pattern-apple.patt">
            <a-image src="images/apple.jpg" rotation="-90 0 0" width="1.2" height="1.2"></a-image>
            <a-text value="APPLE: QUA TAO" color="#FFD700" align="center" position="0 0.5 0" rotation="-90 0 0" width="4"></a-text>
        </a-marker>

        <a-marker type="pattern" url="ar/pattern-cat.patt">
            <a-image src="images/cat.jpg" rotation="-90 0 0" width="1.2" height="1.2"></a-image>
            <a-text value="CAT: CON MEO" color="#FFD700" align="center" position="0 0.5 0" rotation="-90 0 0" width="4"></a-text>
        </a-marker>

        <!-- Thêm các marker khác tương tự ở đây -->

        <a-entity camera></a-entity>
    </a-scene>

    <div id="snap-button-container">
        <button id="snap">CHỤP</button>
    </div>

    <script>
        window.onload = function() {
            const scene = document.querySelector('a-scene');
            const snapBtn = document.getElementById('snap');

            snapBtn.addEventListener('click', function() {
                // SỬA LỖI 2: Tìm video động vì AR.js tạo video sau khi khởi tạo
                const videoFeed = document.querySelector('video#arjs-video') || document.querySelector('video');
                const arCanvas = scene.canvas;

                if (!videoFeed || !arCanvas) {
                    alert("Đang khởi tạo camera, vui lòng đợi một chút!");
                    return;
                }

                // Thiết lập kích thước
                const targetWidth = videoFeed.videoWidth;
                const targetHeight = videoFeed.videoHeight;

                const finalCanvas = document.createElement('canvas');
                finalCanvas.width = targetWidth;
                finalCanvas.height = targetHeight;
                const ctx = finalCanvas.getContext('2d');

                // Vẽ camera background
                ctx.drawImage(videoFeed, 0, 0, targetWidth, targetHeight);

                // Vẽ nội dung AR (Canvas của A-Frame)
                ctx.drawImage(arCanvas, 0, 0, targetWidth, targetHeight);

                // Thêm Watermark
                ctx.font = "bold 25px Arial";
                ctx.fillStyle = "white";
                ctx.textAlign = "right";
                ctx.fillText("Chụp trên LinguaLand", targetWidth - 20, targetHeight - 20);

                // Xuất file
                finalCanvas.toBlob(function(blob) {
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.download = `LinguaLand_${Date.now()}.png`;
                    link.href = url;
                    link.click();
                    setTimeout(() => URL.revokeObjectURL(url), 100);
                }, "image/png");
            });
        };
    </script>
</body>
</html>
