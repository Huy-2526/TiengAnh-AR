<!DOCTYPE html>
<html>
<head>
    <title>LinguaLand - Học Tiếng Anh AR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        /* Đảm bảo màn hình chiếm hết không gian */
        body, html, a-scene {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
        }
        /* Style cho nút chụp */
        #snap-button-container {
            position: fixed; /* Cố định vị trí */
            bottom: 30px;    /* Cách đáy 30px */
            left: 0;
            right: 0;
            display: flex;
            justify-content: center; /* Căn giữa theo chiều ngang */
            align-items: center;
            z-index: 9999;   /* Đảm bảo nút nằm trên cùng */
            pointer-events: none; /* Các sự kiện chuột/chạm sẽ đi xuyên qua container này */
        }
        #snap {
            pointer-events: auto; /* Cho phép tương tác với nút */
            width: 80px;
            height: 80px;
            border-radius: 50%; /* Làm tròn thành hình tròn */
            border: 6px solid rgba(255, 255, 255, 0.8); /* Viền trắng mờ */
            background: radial-gradient(circle, #ff4b2b 0%, #ff416c 100%); /* Gradient từ đỏ sang hồng */
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); /* Bóng đổ */
            cursor: pointer;
            outline: none; /* Bỏ outline khi focus */
            transition: transform 0.1s; /* Hiệu ứng khi bấm */
        }
        #snap:active {
            transform: scale(0.9); /* Co lại khi bấm */
            background: #d4145a; /* Đổi màu khi bấm */
        }
        #snap span {
            color: white;
            font-weight: bold;
            font-family: Arial, sans-serif; /* Font chữ rõ ràng */
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>

<body style="margin: 0px; overflow: hidden;">
    <!-- a-scene cần preserveDrawingBuffer: true để có thể lấy dữ liệu canvas -->
    <a-scene embedded arjs renderer="preserveDrawingBuffer: true;">

        <!-- Các Marker và nội dung AR của bạn ở đây -->

        <!-- Marker cho Apple: Sử dụng mô hình .glb và áp dụng animation xoay -->
        <a-marker type="pattern" url="ar/pattern-apple.patt">
            <a-entity> <!-- Wrapper cho animation và các element khác -->
                <!-- Mô hình 3D .glb -->
                <!-- Đảm bảo bạn có apple.glb trong thư mục 'ar/' -->
                <!-- Điều chỉnh 'rotation' và 'scale' cho phù hợp -->
                <a-entity gltf-model="url(ar/apple.glb)" rotation="-90 0 0" scale="0.5 0.5 0.5"></a-entity>
                <!-- Văn bản đi kèm -->
                <a-text value="APPLE: QUA TAO" color="#FFD700" align="center" position="0 1.5 0" rotation="0 0 0" width="4"></a-text>
            </a-entity>
        </a-marker>

        <!-- Marker cho Banana: Sử dụng mô hình .glb và áp dụng animation xoay -->
        <a-marker type="pattern" url="ar/pattern-banana.patt">
            <a-entity>
                <a-entity gltf-model="url(ar/banana.glb)" rotation="-90 0 0" scale="0.3 0.3 0.3"></a-entity>
                <a-text value="BANANA: QUA CHUOI" color="#FFD700" align="center" position="0 1.5 0" rotation="0 0 0" width="4"></a-text>
            </a-entity>
        </a-marker>

        <a-marker type="pattern" url="ar/pattern-orange.patt">

                <a-text value="ORANGE: QUA CAM" color="#FFD700" align="center" position="0 1.5 0" rotation="0 0 0" width="4"></a-text>
            </a-entity>
        </a-marker>

        <!-- Marker cho Bird: Sử dụng mô hình .glb và áp dụng animation xoay -->
        <a-marker type="pattern" url="ar/pattern-bird.patt">

                <a-entity gltf-model="url(ar/bird.glb)" rotation="-90 0 0" scale="0.1 0.1 0.1"></a-entity>
                <a-text value="BIRD: CON CHIM" color="#FFD700" align="center" position="0 1.5 0" rotation="0 0 0" width="4"></a-text>

        <!-- Marker cho Cat: Sử dụng mô hình .glb và áp dụng animation xoay -->
        <a-marker type="pattern" url="ar/pattern-cat.patt">

        <!-- Marker cho Cow: Sử dụng mô hình .glb và áp dụng animation xoay -->

        <!-- Marker cho Dog: Sử dụng mô hình .glb và áp dụng animation xoay -->

            <a-entity>

        <!-- Marker cho Fish: Sử dụng mô hình .glb và áp dụng animation xoay -->

        <!-- Marker cho Blue: Sử dụng mô hình .glb và áp dụng animation xoay -->

        </a-marker>

        <!-- Marker cho Red: Sử dụng mô hình .glb và áp dụng animation xoay -->
        <a-marker type="pattern" url="ar/pattern-red.patt">
            <a-entity>
                <a-entity gltf-model="url(ar/red.glb)" rotation="-90 0 0" scale="0.8 0.8 0.8"></a-entity>

        <!-- Marker cho Moon: Sử dụng mô hình .glb và áp dụng animation xoay -->

            <a-entity>
                <a-entity gltf-model="url(ar/moon.glb)" rotation="-90 0 0" scale="1.5 1.5 1.5"></a-entity>
                <a-text value="MOON: MAT TRANG" color="#FFD700" align="center" position="0 1.5 0" rotation="0 0 0" width="4"></a-text>
            </a-entity>
        </a-marker>

        <!-- Marker cho So1: Sử dụng mô hình .glb và áp dụng animation xoay -->
        <a-marker type="pattern" url="ar/pattern-so1.patt">
            <a-entity>
                <a-entity gltf-model="url(ar/so1.glb)" rotation="-90 0 0" scale="0.7 0.7 0.7"></a-entity>

            </a-entity>
        </a-marker>

        <!-- Marker cho So2: Sử dụng mô hình .glb và áp dụng animation xoay -->
        <a-marker type="pattern" url="ar/pattern-so2.patt">
            <a-entity>
                <a-entity gltf-model="url(ar/so2.glb)" rotation="-90 0 0" scale="0.7 0.7 0.7"></a-entity>

            </a-entity>
        </a-marker>

        <!-- Marker cho So3: Sử dụng mô hình .glb và áp dụng animation xoay -->
        <a-marker type="pattern" url="ar/pattern-so3.patt">
            <a-entity>
                <a-entity gltf-model="url(ar/so3.glb)" rotation="-90 0 0" scale="0.7 0.7 0.7"></a-entity>
                <a-text value="THREE: SO 3" color="#FFD700" align="center" position="0 1.5 0" rotation="0 0 0" width="4"></a-text>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <!-- Nút chụp được đặt ở đây -->
    <div id="snap-button-container">
        <button id="snap">
            <span>CHỤP</span>
        </button>
    </div>

    <script>
        // Lấy các phần tử DOM cần thiết
        const scene = document.querySelector('a-scene');
        const videoFeed = document.querySelector('#arjs-video') || document.querySelector('video');
        const arCanvas = scene.canvas;

        // Logic để tìm và áp dụng animation cho các mô hình GLTF
        function applyRotationAnimation() {
            const markers = document.querySelectorAll('a-marker');
            markers.forEach(marker => {
                // Tìm tất cả các a-entity con trực tiếp của marker có thuộc tính gltf-model
                const gltfEntities = marker.querySelectorAll(':scope > a-entity[gltf-model]');

                gltfEntities.forEach(gltfEntity => {
                    // Kiểm tra xem wrapper animation đã tồn tại chưa để tránh tạo trùng lặp
                    const parentWrapper = gltfEntity.parentElement;
                    if (parentWrapper && parentWrapper.tagName === 'A-ENTITY' && parentWrapper.hasAttribute('animation')) {
                        return; // Wrapper đã có animation, bỏ qua
                    }

                    // Tạo một a-entity cha mới để nhóm mô hình GLTF và các thành phần khác của marker
                    const animationWrapper = document.createElement('a-entity');

                    // Di chuyển mô hình GLTF (gltfEntity) vào bên trong wrapper
                    animationWrapper.appendChild(gltfEntity);

                    // Di chuyển các thành phần con khác của marker (như a-text) vào wrapper
                    // Chỉ di chuyển nếu chúng không phải là wrapper animation đã được tạo
                    Array.from(marker.children).forEach(child => {
                        // Kiểm tra xem 'child' có phải là 'gltfEntity' hay không
                        // và có phải là một 'a-entity' đã có animation hay không
                        if (child !== gltfEntity && !(child.tagName === 'A-ENTITY' && child.hasAttribute('animation'))) {
                            animationWrapper.appendChild(child);
                        }
                    });

                    // Thêm wrapper vào marker (thay thế cho các phần tử đã di chuyển vào wrapper)
                    marker.appendChild(animationWrapper);

                    // Áp dụng thuộc tính animation cho wrapper
                    // Tùy chỉnh 'dur' (thời gian một vòng quay) và 'easing' (kiểu xoay) theo ý muốn
                    animationWrapper.setAttribute('animation', 'property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear');
                });
            });
        }

        // Gọi hàm áp dụng animation sau khi scene A-Frame đã sẵn sàng
        scene.addEventListener('loaded', applyRotationAnimation);

        // Xử lý sự kiện click nút chụp
        document.getElementById('snap').addEventListener('click', function() {
            if (!videoFeed || !arCanvas) {
                console.error("Không thể lấy đủ các thành phần camera hoặc canvas AR.");
                return;
            }

            // Tạo một canvas trung gian để kết hợp cả hai lớp
            const finalCanvas = document.createElement('canvas');
            // Đảm bảo kích thước của finalCanvas bằng kích thước thực của video feed
            finalCanvas.width = videoFeed.videoWidth;
            finalCanvas.height = videoFeed.videoHeight;
            const ctx = finalCanvas.getContext('2d');

            // 1. Vẽ lớp video feed (hình ảnh từ camera) lên finalCanvas
            ctx.drawImage(videoFeed, 0, 0, finalCanvas.width, finalCanvas.height);

            // 2. Vẽ lớp canvas AR lên trên video feed
            // Cần đảm bảo tỷ lệ vẽ của arCanvas khớp với videoFeed
            ctx.drawImage(arCanvas, 0, 0, finalCanvas.width, finalCanvas.height);

            // 3. Thêm Watermark (ví dụ: "Chụp trên LinguaLand")
            ctx.font = "bold 30px Arial, sans-serif"; // Kích thước và font chữ lớn hơn
            ctx.fillStyle = "rgba(255, 255, 255, 0.9)"; // Màu trắng với độ trong suốt
            ctx.textAlign = "right"; // Căn phải
            ctx.shadowColor = "rgba(0, 0, 0, 0.5)"; // Màu bóng
            ctx.shadowBlur = 4; // Độ mờ của bóng

            // Vị trí của watermark: cách mép phải 25px, cách mép dưới 35px
            ctx.fillText("Chụp trên LinguaLand", finalCanvas.width - 25, finalCanvas.height - 35);

            // 4. Chuyển đổi finalCanvas thành ảnh PNG và kích hoạt tải xuống
            const dataURL = finalCanvas.toDataURL("image/png");
            const link = document.createElement('a');
            link.download = "LinguaLand_AR_Capture_" + new Date().getTime() + ".png"; // Tên file có thời gian
            link.href = dataURL;
            link.click(); // Tự động click để tải về

            console.log("Đã chụp ảnh và chuẩn bị tải về!");
        });
    </script>
</body>
</html>
