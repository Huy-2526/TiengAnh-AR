<!DOCTYPE html>
<html>
<head>
    <title>LinguaLand - Học Tiếng Anh AR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        /* Đảm bảo màn hình chiếm hết không gian */
        body, html, a-scene {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
        }
        /* Style cho nút chụp */
        #snap-button-container {
            position: fixed; /* Cố định vị trí */
            bottom: 30px;    /* Cách đáy 30px */
            left: 0;
            right: 0;
            display: flex;
            justify-content: center; /* Căn giữa theo chiều ngang */
            align-items: center;
            z-index: 9999;   /* Đảm bảo nút nằm trên cùng */
            pointer-events: none; /* Các sự kiện chuột/chạm sẽ đi xuyên qua container này */
        }
        #snap {
            pointer-events: auto; /* Cho phép tương tác với nút */
            width: 80px;
            height: 80px;
            border-radius: 50%; /* Làm tròn thành hình tròn */
            border: 6px solid rgba(255, 255, 255, 0.8); /* Viền trắng mờ */
            background: radial-gradient(circle, #ff4b2b 0%, #ff416c 100%); /* Gradient từ đỏ sang hồng */
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); /* Bóng đổ */
            cursor: pointer;
            outline: none; /* Bỏ outline khi focus */
            transition: transform 0.1s; /* Hiệu ứng khi bấm */
        }
        #snap:active {
            transform: scale(0.9); /* Co lại khi bấm */
            background: #d4145a; /* Đổi màu khi bấm */
        }
        #snap span {
            color: white;
            font-weight: bold;
            font-family: Arial, sans-serif; /* Font chữ rõ ràng */
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>

<body style="margin: 0px; overflow: hidden;">
    <!-- a-scene cần preserveDrawingBuffer: true để có thể lấy dữ liệu canvas -->
    <a-scene embedded arjs renderer="preserveDrawingBuffer: true;">

        <a-entity camera></a-entity>
    </a-scene>

    <!-- Nút chụp được đặt ở đây -->
    <div id="snap-button-container">
        <button id="snap">
            <span>CHỤP</span>
        </button>
    </div>

    <script>
        // Lấy các phần tử DOM cần thiết
        const scene = document.querySelector('a-scene');
        // Lớp video nền từ camera AR.js
        // Note: Nó có thể có ID khác nhau tùy phiên bản AR.js, thông thường là #arjs-video
        const videoFeed = document.querySelector('#arjs-video') || document.querySelector('video');
        // Canvas của A-Frame, nơi chứa các đối tượng AR
        const arCanvas = scene.canvas;

        document.getElementById('snap').addEventListener('click', function() {
            if (!videoFeed || !arCanvas) {
                console.error("Không thể lấy đủ các thành phần camera hoặc canvas AR.");
                return;
            }

            // --- Tối ưu hóa: Sử dụng kích thước cố định hoặc giảm kích thước ảnh chụp ---
            // Kích thước bạn muốn cho ảnh chụp (ví dụ: 1280x720).
            // Có thể thử nghiệm với các giá trị khác nhau để cân bằng giữa chất lượng và tốc độ.
            // Nếu bạn muốn giữ nguyên độ phân giải gốc, hãy bỏ comment các dòng sau và comment các dòng targetWidth/targetHeight.
            const targetWidth = 1280;
            const targetHeight = Math.round(videoFeed.videoHeight * (targetWidth / videoFeed.videoWidth)); // Giữ tỷ lệ

            // Nếu muốn độ phân giải gốc, sử dụng:
            // const targetWidth = videoFeed.videoWidth;
            // const targetHeight = videoFeed.videoHeight;

            // Tạo một canvas trung gian để kết hợp cả hai lớp
            const finalCanvas = document.createElement('canvas');
            finalCanvas.width = targetWidth;
            finalCanvas.height = targetHeight;
            const ctx = finalCanvas.getContext('2d');

            // 1. Vẽ lớp video feed (hình ảnh từ camera) lên finalCanvas theo kích thước mục tiêu
            ctx.drawImage(videoFeed, 0, 0, targetWidth, targetHeight);

            // 2. Vẽ lớp canvas AR lên trên video feed theo kích thước mục tiêu
            ctx.drawImage(arCanvas, 0, 0, targetWidth, targetHeight);

            // 3. Thêm Watermark (ví dụ: "Chụp trên LinguaLand")
            // Điều chỉnh font size cho phù hợp với kích thước ảnh
            const watermarkFontSize = Math.max(14, Math.round(targetWidth / 40)); // Cỡ font tối thiểu 14, tỉ lệ với width
            const watermarkPaddingRight = Math.max(10, Math.round(targetWidth / 40));
            const watermarkPaddingBottom = Math.max(15, Math.round(targetHeight / 40));

            ctx.font = `bold ${watermarkFontSize}px Arial, sans-serif`; // Kích thước và font chữ rõ ràng
            ctx.fillStyle = "rgba(255, 255, 255, 0.9)"; // Màu trắng với độ trong suốt
            ctx.textAlign = "right"; // Căn phải
            ctx.shadowColor = "rgba(0, 0, 0, 0.5)"; // Màu bóng
            ctx.shadowBlur = 4; // Độ mờ của bóng

            // Vị trí của watermark: cách mép phải và dưới một khoảng nhất định
            ctx.fillText("Chụp trên LinguaLand", targetWidth - watermarkPaddingRight, targetHeight - watermarkPaddingBottom);

            // 4. Chuyển đổi finalCanvas thành ảnh PNG và kích hoạt tải xuống bằng toBlob()
            finalCanvas.toBlob(function(blob) {
                if (!blob) {
                    console.error("Không thể tạo blob từ canvas.");
                    return;
                }

                // Tạo URL tạm thời từ blob
                const url = URL.createObjectURL(blob);

                // Tạo thẻ anchor để tải xuống
                const link = document.createElement('a');
                link.download = "LinguaLand_AR_Capture_" + new Date().getTime() + ".png"; // Tên file có thời gian
                link.href = url;

                // Kích hoạt sự kiện click để tải về
                link.click();

                // Giải phóng URL object sau khi nó được sử dụng để tải xuống
                // Điều này giúp giải phóng bộ nhớ
                // Có thể cần trì hoãn một chút để đảm bảo tải xuống bắt đầu
                setTimeout(() => {
                    URL.revokeObjectURL(url);
                }, 100); // Trì hoãn 100ms trước khi giải phóng URL

                console.log("Đã chụp ảnh và chuẩn bị tải về!");
            }, "image/png"); // Chỉ định định dạng là PNG
        });
    </script>
