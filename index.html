    <div style="position: fixed; bottom: 30px; left: 0; right: 0; display: flex; justify-content: center; align-items: center; z-index: 9999; pointer-events: none;">
    <button id="snap" style="
        pointer-events: auto;
        width: 80px; 
        height: 80px; 
        border-radius: 50%; 
        border: 6px solid rgba(255, 255, 255, 0.8); 
        background: radial-gradient(circle, #ff4b2b 0%, #ff416c 100%); 
        box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        cursor: pointer;
        outline: none;
        transition: transform 0.1s active;">
        <span style="color: white; font-weight: bold; font-family: Arial; font-size: 14px;">CHỤP</span>
    </button>
</div>

<style>
    #snap:active { transform: scale(0.9); background: #d4145a; }
</style>
    <script>
    document.getElementById('snap').addEventListener('click', function() {
        // 1. Lấy các thành phần cần thiết
        const scene = document.querySelector('a-scene');
        const video = document.querySelector('video'); // Đây là camera nền
        const canvasAR = scene.canvas; // Đây là lớp hình ảnh/chữ AR

        // 2. Tạo canvas trung gian để "trộn" 2 lớp lại
        const finalCanvas = document.createElement('canvas');
        finalCanvas.width = video.videoWidth;
        finalCanvas.height = video.videoHeight;
        const ctx = finalCanvas.getContext('2d');

        // 3. Bước 1: Vẽ hình camera trước
        ctx.drawImage(video, 0, 0, finalCanvas.width, finalCanvas.height);

        // 4. Bước 2: Vẽ hình AR đè lên (phải lấy đúng tỷ lệ)
        ctx.drawImage(canvasAR, 0, 0, finalCanvas.width, finalCanvas.height);

        // 5. Bước 3: Đóng dấu Watermark "Chụp trên LinguaLand"
        ctx.font = "bold 30px Arial";
        ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
        ctx.textAlign = "right";
        ctx.shadowColor = "rgba(0, 0, 0, 0.5)";
        ctx.shadowBlur = 4;
        
        // Vẽ ở góc dưới bên phải
        ctx.fillText("Chụp trên LinguaLand", finalCanvas.width - 25, finalCanvas.height - 35);

        // 6. Tải ảnh về máy
        const dataURL = finalCanvas.toDataURL("image/png");
        const link = document.createElement('a');
        link.download = "LinguaLand_" + new Date().getTime() + ".png";
        link.href = dataURL;
        link.click();
        
        console.log("Bạn ơi, đã chụp xong rồi nhé!");
    });
</script></body>
